version: '3.8'

services:
  php-app:
    build:
      context: .
      dockerfile: Dockerfile
#    volumes:
#      - .:/var/www/html
    networks:
      - devops-network

  nginx-server:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    ports:
      - "8080:80"
#    volumes:
#      - .:/var/www/html
    depends_on:
      - php-app
    networks:
      - devops-network

  # 新增的 MySQL 数据库服务
  mysql-db:
    image: mysql:8.0          # 使用官方 MySQL 8.0 镜像
    restart: unless-stopped   # 如果发生崩溃，自动重启
    environment:
      MYSQL_DATABASE: devops
      MYSQL_ROOT_PASSWORD: zhz888
      MYSQL_USER: devops
      MYSQL_PASSWORD: zhz888
    ports:
      - "3306:3306"           # 映射到宿主机，方便你用 Navicat/DataGrip 客户端连接
    volumes:
      - db-data:/var/lib/mysql   # 将容器内的数据目录挂载到外部，实现数据持久化
    networks:
      - devops-network

volumes:
  db-data:

networks:
  devops-network:
    driver: bridge

